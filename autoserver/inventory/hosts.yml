---
all:
  hosts:
    localhost:
      ansible_connection: local           # deploy playbooks run here

  children:

    # ── Infrastructure ────────────────────────────────────────────────────────
    esxi:
      hosts:
        esxi-host-01:
          ansible_host: 192.168.100.10
      vars:
        ansible_connection: local         # ESXi managed via pyVmomi API, not SSH

    # ── Deployed VMs — uncomment each entry after deploying ──────────────────
    rhel:
      hosts:
        # rocky-01:
        #   ansible_host: 192.168.100.101
      vars:
        ansible_user: ansible
        ansible_ssh_private_key_file: ~/.ssh/ansible_id_rsa
        ansible_become: true
        ansible_become_method: sudo

    windows:
      hosts:
        # win-server-01:
        #   ansible_host: 192.168.100.201
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5985
        ansible_user: ansible-svc
        ansible_password: "{{ vault_windows_ansible_pass }}"
        ansible_winrm_operation_timeout_sec: 120
        ansible_winrm_read_timeout_sec: 150

    vendor:
      hosts:
        # infoblox-01:
        #   ansible_host: 192.168.100.50
        # nsx-manager-01:
        #   ansible_host: 192.168.100.51
      vars:
        ansible_connection: local         # vendor appliances managed via their own APIs
