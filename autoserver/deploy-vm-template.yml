---
# Deploy a VM from a vCenter template, rename it, and assign a static IP.
# Run from the autoserver/ directory — inventory/group_vars are loaded automatically.
#
# Prerequisites:
#   - community.vmware collection installed (ansible-galaxy install -r requirements.yml)
#   - Template has open-vm-tools + perl (Linux) or sysprep available (Windows)
#   - vault_vcenter_password set in inventory/group_vars/all/vault.yml
#
# Usage:
#   ansible-playbook deploy-vm-template.yml
#   ansible-playbook deploy-vm-template.yml -e vm_name=web01 -e vm_ip=10.0.1.60
#   ansible-playbook deploy-vm-template.yml -e @vars/deploy-vm-template.yml

- name: Deploy VM from template
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - vars/deploy-vm-template.yml

  vars:
    vcenter_password: "{{ vault_vcenter_password }}"

    # Shared connection args passed to every vmware module
    _vcenter: &vcenter
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      validate_certs: false

  tasks:
    # -------------------------------------------------------------------------
    # 1. Validate required variables are defined and non-empty
    # -------------------------------------------------------------------------
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - vm_name | length > 0
          - vm_template | length > 0
          - vm_ip | length > 0
          - vcenter_hostname | length > 0
          - vault_vcenter_password | length > 0
        fail_msg: "Missing required variable — check playbooks/vars/deploy_vm.yml"
      tags: always

    # -------------------------------------------------------------------------
    # 2. Check template exists before attempting clone
    # -------------------------------------------------------------------------
    - name: Gather template info
      community.vmware.vmware_guest_info:
        <<: *vcenter
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ vm_template }}"
      register: template_info
      failed_when: template_info.instance is not defined
      tags: preflight

    - name: Show template details
      ansible.builtin.debug:
        msg: "Found template '{{ vm_template }}' — guest OS: {{ template_info.instance.config.guestFullName }}"
      tags: preflight

    # -------------------------------------------------------------------------
    # 3. Clone the template and apply customization (hostname + static IP)
    #    VMware applies the customization spec on first boot via vmware-tools.
    # -------------------------------------------------------------------------
    - name: Deploy VM from template
      community.vmware.vmware_guest:
        <<: *vcenter
        datacenter: "{{ vcenter_datacenter }}"
        cluster: "{{ vcenter_cluster | default(omit) }}"
        esxi_hostname: "{{ vcenter_esxi_host }}"
        folder: "{{ vcenter_folder }}"
        datastore: "{{ vcenter_datastore }}"

        # Identity
        name: "{{ vm_name }}"
        template: "{{ vm_template }}"
        state: poweredon

        # Hardware overrides (omit keys when value is 0 to keep template values)
        hardware:
          num_cpus: "{{ vm_num_cpus }}"
          memory_mb: "{{ vm_memory_mb }}"

        # Disk resize — only applied if vm_disk_gb > 0
        disk: "{{ [] if vm_disk_gb == 0 else [{'size_gb': vm_disk_gb, 'type': 'thin'}] }}"

        # Network adapter
        networks:
          - name: "{{ vm_network_label }}"
            ip: "{{ vm_ip }}"
            netmask: "{{ vm_netmask }}"
            gateway: "{{ vm_gateway }}"
            type: vmxnet3

        # Guest OS customization — sets hostname and static IP on first boot
        customization:
          hostname: "{{ vm_name }}"
          domain: "{{ vm_domain }}"
          timezone: "{{ vm_timezone }}"
          dns_servers: "{{ vm_dns_servers }}"
          dns_suffix:
            - "{{ vm_domain }}"

          # Windows-only fields (ignored for Linux)
          autologon: false
          password: "{{ vault_vm_admin_password | default(omit) }}"

        wait_for_customization: true
        wait_for_customization_timeout: 600
      register: deploy_result
      tags: deploy

    - name: Show deployment result
      ansible.builtin.debug:
        msg:
          - "VM '{{ vm_name }}' deployed successfully"
          - "Instance UUID : {{ deploy_result.instance.hw_product_uuid }}"
          - "Assigned IP   : {{ vm_ip }}"
      tags: deploy

    # -------------------------------------------------------------------------
    # 4. Wait for VMware Tools to report the IP is reachable
    # -------------------------------------------------------------------------
    - name: Wait for VMware Tools to report guest IP
      community.vmware.vmware_guest_tools_wait:
        <<: *vcenter
        name: "{{ vm_name }}"
        datacenter: "{{ vcenter_datacenter }}"
        timeout: 300
      register: tools_result
      tags: deploy

    - name: Show guest IP reported by VMware Tools
      ansible.builtin.debug:
        msg: "Guest IP via VMware Tools: {{ tools_result.instance.ipv4 | default(vm_ip) }}"
      tags: deploy

    # -------------------------------------------------------------------------
    # 5. Confirm SSH (Linux) or WinRM (Windows) is responding
    # -------------------------------------------------------------------------
    - name: Wait for SSH to become available (Linux)
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
      when: not vm_is_windows
      tags: verify

    - name: Wait for WinRM to become available (Windows)
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 5985
        delay: 30
        timeout: 300
        state: started
      when: vm_is_windows
      tags: verify

    # -------------------------------------------------------------------------
    # 6. Summary
    # -------------------------------------------------------------------------
    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "  VM deployment complete"
          - "  Name     : {{ vm_name }}.{{ vm_domain }}"
          - "  IP       : {{ vm_ip }}"
          - "  Host     : {{ vcenter_esxi_host }}"
          - "  Datastore: {{ vcenter_datastore }}"
          - "============================================"
      tags: always
