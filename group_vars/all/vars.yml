---
# Global variables shared across all environments
# Environment-specific overrides live in inventories/<env>/group_vars/

company: example
support_email: ops@example.com

common_packages:
  - curl
  - vim
  - htop
  - git
  - unzip
  - ca-certificates

sysctl_settings:
  net.ipv4.tcp_syncookies: 1
  net.ipv4.ip_forward: 0
  vm.swappiness: 10
