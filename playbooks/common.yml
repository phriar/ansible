---
# Apply baseline configuration to every host.
# Usage: ansible-playbook playbooks/common.yml [--limit webservers]

- name: Common baseline
  hosts: all
  gather_facts: true

  vars_files:
    - "{{ inventory_dir }}/group_vars/all.yml"

  pre_tasks:
    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      tags: packages

  roles:
    - common

  post_tasks:
    - name: Verify connectivity
      ansible.builtin.ping:
      tags: always
