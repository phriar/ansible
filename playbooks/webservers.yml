---
# Configure and deploy webservers.
# Usage: ansible-playbook playbooks/webservers.yml [--tags deploy]

- name: Configure webservers
  hosts: webservers
  gather_facts: true

  vars_files:
    - "{{ inventory_dir }}/group_vars/all.yml"

  vars:
    # Override defaults here or pass via -e on the CLI
    webserver_port: 443

  roles:
    - common
    - webserver

  tags: webservers
